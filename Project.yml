name: QuickAirDrop

options:
  bundleIdPrefix: com.jaryi
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_REQUIRED: NO

configs:
  Debug: debug
  Release: release

targets:
  QuickAirDrop:
    type: application
    platform: macOS
    sources:
      - path: QuickAirDrop/Sources
        type: group
    resources:
      - path: QuickAirDrop/Resources
        type: group
        optional: true

    info:
      path: Generated/App-Info.plist
      properties:
        LSUIElement: true
        CFBundleDisplayName: QuickAirDrop
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        LSApplicationCategoryType: public.app-category.utilities
        NSHighResolutionCapable: true

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jaryi.QuickAirDrop
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: Generated/App-Info.plist
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/../Frameworks"

      configs:
        Debug:
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
          GCC_PREPROCESSOR_DEFINITIONS:
            - "DEBUG=1"
            - "$(inherited)"
        Release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"
          SWIFT_COMPILATION_MODE: wholemodule
          VALIDATE_PRODUCT: YES

    scheme:
      configVariants: []
      testTargets: []
      gatherCoverageData: false

schemes:
  QuickAirDrop:
    shared: true
    build:
      targets:
        QuickAirDrop: all
      parallelizeBuild: true
    run:
      config: Debug
    test:
      config: Debug
    archive:
      config: Release
