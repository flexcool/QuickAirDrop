name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.4'

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Project
        run: xcodegen generate

      - name: Build
        run: |
          set -o pipefail
          xcodebuild build \
            -project QuickAirDrop.xcodeproj \
            -scheme QuickAirDrop \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcbeautify --renderer github-actions || true

      - name: Debug - Show Build Products
        run: |
          echo "=== DerivedData Structure ==="
          find build -type d -maxdepth 4 2>/dev/null || echo "build dir empty"
          echo ""
          echo "=== Looking for .app bundles ==="
          find build -name "*.app" -type d 2>/dev/null || echo "No .app found"
          echo ""
          echo "=== Looking for executables ==="
          find build -name "QuickAirDrop" -type f 2>/dev/null || echo "No executable found"
          echo ""
          echo "=== Contents of Release folder ==="
          ls -la build/Build/Products/Release/ 2>/dev/null || echo "Release folder not found"

      - name: Package App
        run: |
          # Try multiple possible paths
          APP_PATH=$(find build -name "QuickAirDrop.app" -type d 2>/dev/null | head -1)
          
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: QuickAirDrop.app not found!"
            echo "=== All .app files ==="
            find build -name "*.app" 2>/dev/null
            exit 1
          fi
          
          echo "Found app at: $APP_PATH"
          echo ""
          echo "=== App Bundle Contents ==="
          find "$APP_PATH" -type f 2>/dev/null
          echo ""
          echo "=== Info.plist ==="
          cat "$APP_PATH/Contents/Info.plist" 2>/dev/null || echo "No Info.plist!"
          echo ""
          echo "=== Executable ==="
          ls -la "$APP_PATH/Contents/MacOS/" 2>/dev/null || echo "No MacOS folder!"
          
          zip -r QuickAirDrop.zip "$APP_PATH"
          ls -la QuickAirDrop.zip

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: QuickAirDrop-${{ github.run_number }}
          path: QuickAirDrop.zip
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: QuickAirDrop.zip
          draft: false
          prerelease: false
          generate_release_notes: true
