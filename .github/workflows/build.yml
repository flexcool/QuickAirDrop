name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.4'

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Project
        run: xcodegen generate

      - name: Show Generated Project
        run: |
          echo "=== Project Structure ==="
          ls -la *.xcodeproj 2>/dev/null || echo "No xcodeproj"
          echo "=== Info.plist ==="
          cat Generated/App-Info.plist 2>/dev/null || echo "No plist"

      - name: Build
        run: |
          xcodebuild build \
            -project QuickAirDrop.xcodeproj \
            -scheme QuickAirDrop \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Find Built App
        run: |
          echo "=== Looking for .app bundle ==="
          find build -name "*.app" -type d 2>/dev/null
          echo "=== Contents of Products ==="
          ls -laR build/Build/Products/ 2>/dev/null || echo "Products not found"

      - name: Package App
        run: |
          APP_PATH=$(find build -name "QuickAirDrop.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: QuickAirDrop.app not found!"
            echo "=== Full build output ==="
            find build -type f -name "*.app" 2>/dev/null
            exit 1
          fi
          echo "Found app at: $APP_PATH"
          echo "=== App Contents ==="
          ls -laR "$APP_PATH" 2>/dev/null
          zip -r QuickAirDrop.zip "$APP_PATH"
          echo "=== Zip created ==="
          ls -la QuickAirDrop.zip

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: QuickAirDrop-${{ github.run_number }}
          path: QuickAirDrop.zip
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: QuickAirDrop.zip
          draft: false
          prerelease: false
          generate_release_notes: true
